# Render blueprint for xSquad (free tier: no card, ephemeral disk —
# app/seed.py restores engine state on each boot).
services:
  - type: web
    name: xsquad
    runtime: python
    plan: free
    region: frankfurt        # EU — marginally better odds with the FPL API than US
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
